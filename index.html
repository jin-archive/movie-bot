<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화계 구인정보</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f9f9f9; }
        h1 { text-align: center; color: #333; }
        .update-time { text-align: right; font-size: 0.9em; color: #777; margin-bottom: 20px; }
        
        /* 탭 스타일 */
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .tab-button { background-color: #eee; border: none; padding: 10px 15px; cursor: pointer; font-size: 16px; margin-right: 5px; border-radius: 5px 5px 0 0; }
        .tab-button:hover { background-color: #ddd; }
        .tab-button.active { background-color: #333; color: white; font-weight: bold; }
        
        /* 게시판 리스트 스타일 */
        .board-list { display: none; background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .board-list.active { display: block; }
        .board-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .board-item:last-child { border-bottom: none; }
        .board-item a { text-decoration: none; color: #0056b3; flex-grow: 1; padding-right: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .board-item a:hover { text-decoration: underline; color: #003d82; }
        .board-item .date { color: #666; font-size: 0.9em; min-width: 80px; text-align: right; }
    </style>
</head>
<body>

    <h1>영화계 구인정보</h1>
    <div class="update-time" id="updateTime">마지막 업데이트: 불러오는 중...</div>

    <div class="tabs">
        <button class="tab-button active" onclick="openTab('kofic')">영화진흥위원회</button>
        <button class="tab-button" onclick="openTab('cine21')">씨네21</button>
        <button class="tab-button" onclick="openTab('krmedia')">전국미디어센터협의회</button>
        <button class="tab-button" onclick="openTab('kofa')">한국영상자료원</button>
        <button class="tab-button" onclick="openTab('dureraum')">영화의전당</button>
    </div>

    <div id="kofic" class="board-list active"></div>
    <div id="cine21" class="board-list"></div>
    <div id="krmedia" class="board-list"></div>
    <div id="kofa" class="board-list"></div>
    <div id="dureraum" class="board-list"></div>

    <script>
        // 탭 전환 로직
        function openTab(tabId) {
            document.querySelectorAll('.board-list').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // data.json 데이터를 가져와서 HTML로 렌더링하는 로직
        async function loadData() {
            try {
                // 캐시 방지를 위해 뒤에 타임스탬프 추가
                const response = await fetch('data.json?' + new Date().getTime());
                const data = await response.json();

                document.getElementById('updateTime').innerText = `마지막 업데이트: ${data.last_updated}`;

                const keys = ['kofic', 'cine21', 'krmedia', 'kofa', 'dureraum'];
                
                keys.forEach(key => {
                    const container = document.getElementById(key);
                    container.innerHTML = ''; // 초기화
                    
                    if(data[key] && data[key].length > 0) {
                        data[key].forEach(item => {
                            container.innerHTML += `
                                <div class="board-item">
                                    <a href="${item.link}" target="_blank">${item.title}</a>
                                    <span class="date">${item.date}</span>
                                </div>
                            `;
                        });
                    } else {
                        container.innerHTML = '<p style="text-align:center; color:#999;">새로운 게시글이 없습니다.</p>';
                    }
                });

            } catch (error) {
                console.error("데이터를 불러오는 중 오류가 발생했습니다.", error);
                document.getElementById('updateTime').innerText = "데이터 불러오기 실패";
            }
        }

        // 페이지 로드 시 데이터 호출
        window.onload = loadData;
    </script>

</body>
</html>
